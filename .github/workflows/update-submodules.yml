name: Update submodules

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: git submodule update --remote
      - uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update submodules"
